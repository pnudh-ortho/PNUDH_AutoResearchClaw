# ============================================================
# AutoResearch Configuration
# config.autoresearch.yaml
#
# 복사해서 각 프로젝트별 config로 사용하세요.
# autoresearch new --config config.autoresearch.yaml
#
# 9-Stage Pipeline:
#   Stage 1  Input Classification  [CP 1]       ← intake 자동 실행
#   Stage 2  Background Knowledge  [CP 2]        ← stage2.literature
#   Stage 3  Data Analysis         [CP 3A / 3B]  ← stage3.analysis
#   Stage 4  Visualization         [CP 4]        ← stage4.visualization
#   Stage 5  Paper Outline         [CP 5]
#   Stage 6  Paper Draft           [CP 6-1…6-6]  ← stage6.writing
#   Stage 7  Peer Review           [CP 7]        ← stage7.review
#   Stage 8  Paper Revision        [CP 8]
#   Stage 9  Proofreading          [CP 9]        ← stage9.proofreader
# ============================================================

# ──────────────────────────────────────────────────────────────
# [1] 프로젝트 기본 정보
# ──────────────────────────────────────────────────────────────
project:
  name: "my-research-project"          # 세션 디렉토리 이름에 사용됨

# ──────────────────────────────────────────────────────────────
# [2] 연구 정보 (REQUIRED)
# ──────────────────────────────────────────────────────────────
research:
  topic: >
    여기에 연구 주제를 입력하세요.
    한 문단 이내로 배경·맥락·데이터 특성을 설명하면
    Stage 2 Literature와 Stage 5 Story Writer가 더 정확하게 작동합니다.

  hypothesis: ""

  study_type: "observational"

  domains:
    - "biomedicine"
    # 추가 예시: "oncology", "cardiology", "neuroscience",
    #            "orthopedics", "public-health", "clinical-trial"

  journal_target: ""
  # 목표 학술지 (선택). 지정 시 Stage 6 Section Writer가
  # 해당 학술지의 스타일 가이드라인을 참고합니다.
  # 예: "PLOS ONE", "Scientific Reports", "Journal of Clinical Medicine"

# ──────────────────────────────────────────────────────────────
# [3] 세션 설정
# ──────────────────────────────────────────────────────────────
pipeline:
  sessions_dir: "sessions"             # 세션 루트 디렉토리
  session_id: ""                       # 비워두면 실행 시 자동생성
                                       # 기존 세션 재개: "20260404-060000-abc123"

# ──────────────────────────────────────────────────────────────
# [4] Stage 2 — 문헌 검색 (Background Knowledge)
# ──────────────────────────────────────────────────────────────
stage2:
  literature:
    databases:
      - pubmed                         # 필수
      - scholar                        # pip install scholarly
    pubmed_max_results: 20
    scholar_max_results: 10
    date_restriction: ""               # 제한 없음 (권장)
                                       # 예: "2015/01/01:2026/12/31"
    include_preprints: false           # 세미날 논문인 경우만 true
    pico_search: true                  # PICO 구조로 Boolean 쿼리 자동 생성

# ──────────────────────────────────────────────────────────────
# [5] Stage 3 — 데이터 분석 (Data Analysis)
# ──────────────────────────────────────────────────────────────
stage3:
  analysis:
    language: "python"                 # python | r | both
    python_path: "/home/hyeonjin/miniconda3/envs/claude/bin/python3"
    r_path: ""                         # Rscript 경로. 비우면 PATH에서 탐색
    timeout_sec: 120
    python_packages:
      - pandas
      - numpy
      - scipy
      - statsmodels
      - pingouin
    r_packages:
      - stats
      - rstatix
      - car

# ──────────────────────────────────────────────────────────────
# [6] Stage 4 — 시각화 (Visualization)
# ──────────────────────────────────────────────────────────────
stage4:
  visualization:
    language: "python"                 # python | r
    dpi: 300                           # 최소 300 DPI (저널 요건)
    figure_width_in: 6.5               # full-width (single: 3.5, 1.5col: 5.0)
    colorblind_safe: true
    output_format:
      - pdf                            # vector (제출용)
      - png                            # raster (미리보기용)
    timeout_sec: 180

# ──────────────────────────────────────────────────────────────
# [7] Stage 6 — 원고 작성 (Paper Draft)
# ──────────────────────────────────────────────────────────────
stage6:
  writing:
    citation_style: "vancouver"        # vancouver | apa | harvard | nature
    word_limits:
      abstract: 250
      methods: 800
      results: 1000
      discussion: 1200
      introduction: 600
      conclusion: 300

# ──────────────────────────────────────────────────────────────
# [8] Stage 7 — 동료 리뷰 (Peer Review)
# ──────────────────────────────────────────────────────────────
stage7:
  review:
    auto_synthesize: true              # 3개 리뷰 완료 시 자동 합성

# ──────────────────────────────────────────────────────────────
# [9] Stage 9 — 교정 (Proofreading)
# ──────────────────────────────────────────────────────────────
stage9:
  proofreader:
    checks:
      terminology: true
      abbreviations: true
      figure_references: true
      statistics_consistency: true
      claim_language: true             # Abstract/Conclusion 과장 표현 감지

# ──────────────────────────────────────────────────────────────
# [10] 런타임 설정
# ──────────────────────────────────────────────────────────────
runtime:
  timezone: "Asia/Seoul"
  approval_timeout_hours: 72           # 체크포인트 대기 시간 (연구자 일정 반영)

# ──────────────────────────────────────────────────────────────
# [11] 알림
# ──────────────────────────────────────────────────────────────
notifications:
  channel: "console"                   # console | slack | email
  target: ""
  on_checkpoint_reached: true
  on_stage_complete: true
  on_error: true

# ──────────────────────────────────────────────────────────────
# [12] LLM 설정
# ──────────────────────────────────────────────────────────────
llm:
  provider: "acp"
  acp:
    agent: "claude"
    cwd: "."

# ──────────────────────────────────────────────────────────────
# [13] 출력 설정
# ──────────────────────────────────────────────────────────────
export:
  format: "markdown"                   # markdown | latex (향후 지원 예정)
  output_bundle: "final_output.md"     # sessions/{id}/final_output.md
  include:
    manuscript: true
    analysis_code: true                # stage3/analysis_code.py
    figure_code: true                  # stage4/fig*.py
    figure_captions: true              # stage4/captions.md
    references_bib: true               # stage2/included_papers.bib
    change_log: true                   # stage8/change_log.md
    response_letter: true              # stage8/response_letter.md
    proofread_report: true             # stage9/proofread_report.md
