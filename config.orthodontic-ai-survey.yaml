project:
  name: orthodontic-ai-survey
research:
  topic: "A Methodological Framework for Orthodontic Treatment Outcome Prediction:\n\
    \    How to Leverage Multimodal Deep Learning with 2D Intra-oral Photographs\n\
    \    and 3D Intra-oral Scans.\n    This paper addresses a novel clinical problem\
    \ with limited prior art:\n    given (1) a longitudinal dataset of 2D intra-oral\
    \ photographs (maxillary\n    occlusal, mandibular occlusal, frontal, left buccal,\
    \ right buccal views)\n    taken at periodic checkpoints throughout completed\
    \ orthodontic treatments,\n    and (2) paired pre- and post-treatment 3D intra-oral\
    \ scan datasets, build\n    a system that takes a new patient's baseline 2D photographs\
    \ and 3D scan as\n    input and outputs predicted intermediate treatment-progress\
    \ images and the\n    final post-treatment outcome image.\n    Because direct\
    \ prior work on this exact problem is scarce, the paper's\n    central contribution\
    \ is a technical deep-dive into which existing techniques\n    from adjacent fields\
    \ are most applicable, how each technique works, why it\n    is suitable for this\
    \ problem, and how they should be composed into a\n    coherent pipeline. Specifically,\
    \ the paper should explain and justify\n    choices across: (a) 3D dental data\
    \ representation — point clouds,\n    mesh-based methods, implicit neural representations\
    \ (NeRF, SDF), and\n    voxel grids; (b) 2D-3D multimodal fusion strategies —\
    \ cross-attention,\n    projection-based alignment, and contrastive cross-modal\
    \ pretraining;\n    (c) generative models for image synthesis — conditional diffusion\
    \ models,\n    GANs (pix2pix, CycleGAN), and neural rendering; (d) temporal tooth\n\
    \    movement modeling — video diffusion, latent space interpolation, and\n  \
    \  physics-informed neural networks; (e) training strategies given limited\n \
    \   clinical data — transfer learning, data augmentation, self-supervised\n  \
    \  pretraining, and synthetic data generation. The paper should propose a\n  \
    \  concrete recommended pipeline architecture and discuss why each component\n\
    \    was chosen over alternatives. No real experiments are conducted — this is\n\
    \    a methodological proposal grounded in technical reasoning and adjacent\n\
    \    literature."
